# ============================================================
# nginx.conf — конфигурация Nginx для приложения
# "Волшебная палочка — тест Олливандера"
#
# Поддомен: ollivanders.aurorhq.ru
# ============================================================

server {
    listen 80;
    server_name ollivanders.aurorhq.ru localhost;

    # Корень с файлами приложения
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Gzip — сжатие для ускорения загрузки
    # ============================================================
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ============================================================
    # Кэширование статических ресурсов
    # ============================================================
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /css/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /bg/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================================
    # Прокси для загрузки изображений в VK
    # VK upload серверы не поддерживают CORS — нужен серверный прокси
    # Прокси-сервер запускается в отдельном контейнере (upload-proxy)
    # ============================================================
    location /api/upload {
        proxy_pass http://upload-proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ============================================================
    # Основной location — SPA-like отдача index.html
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;

        # Запрещаем доступ к скрытым файлам
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ============================================================
    # Безопасность
    # ============================================================
    # Разрешаем отображение во фреймах ВКонтакте (для каталога VK)
    # VK открывает приложение в iframe на vk.com и id.vk.com
    add_header Content-Security-Policy "frame-ancestors 'self' https://vk.com https://*.vk.com https://id.vk.com https://*.auth.vk.com;" always;

    # Защита от MIME-тип инъекций
    add_header X-Content-Type-Options "nosniff" always;

    # Реферер-политика
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}